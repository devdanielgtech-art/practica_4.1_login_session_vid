<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sistema</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #007bff;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        button {
            background-color: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Dashboard</h2>
        <button onclick="location.href='/'">Cerrar Sesión</button>
    </div>
    
    <div class="container">
        <h1>¡Bienvenido, {{ usuario }}!</h1>
        <p>Has iniciado sesión correctamente en el sistema.</p>
        <p>Esta es tu área privada.</p>
    </div>
</body>
</html>
